{% extends "base.html" %}

{% block title %}
    Reset Password | Walkies & Whiskers
{% endblock %}

{% block content %}
<section>
    <h1>Reset your password</h1>

    <p>
        Enter the email address linked to your account and we will send you a password reset link.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Send reset email
        </button>
    </form>

    <p>
        <a href="{% url 'login' %}">
            Back to login
        </a>
    </p>
</section>
{% endblock %}
