(% extends "base.html" %)

(% block title %)
    Change Password | Walkies & Whiskers
(% endblock %)

(% block content %)
<section>
    <h1>Change your password</h1>

    <p>
        Enter your current password and choose a new password below.
    </p>

    <form method="post">
        (% csrf_token %)

        {{ form.as_p }}

        <button type="submit">
            Change password
        </button>
    </form>

    <p>
        <a href="{% url 'home' %}">
            Cancel and return home
        </a>
    </p>
</section>

{% endblock %}
