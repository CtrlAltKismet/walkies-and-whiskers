{% extends "base.html" %}

{% block title %}
    Login | Walklies & Whiskers
{% endblock %}

{% block content %}
    <h1>Log In</h1>


    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Log in
        </button>
    </form>

    
    <p>
        Need an account?

        <a href="{% url 'register' %}">
            Register
        </a>
    </p>
{% endblock %}
