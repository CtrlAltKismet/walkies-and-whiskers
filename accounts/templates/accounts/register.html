{% extends "base.html" %}

{% block title %}
    Register | Walkies & Whiskers
{% endblock %}

{% block content %}
    <h1>Create an Account</h1>

    <p>
        Register to add pet profiles and book pet-care services.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>
    </form>

    <p>
        Already have an account?

        <a href="{% url 'login' %}">
            Log in
        </a>
    </p>
{% endblock %}
