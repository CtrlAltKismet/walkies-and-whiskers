<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
            Walkies & Whiskers
        {% endblock %}
    </title>
</head>

<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">
                Walkies & Whiskers
            </a>

            <ul>
                <li>
                    <a href="{% url 'home' %}">Home</a>
                </li>

                <li>
                    <a href="{% url 'service_list' %}">Services</a>
                </li>

                <li>
                    <a href="{% url 'about' %}">About</a>
                </li>

                {% if user.is_authenticated %}
                    <li>
                        <a href="#">Dashboard</a>
                    </li>

                    <li>
                        <a href="#">My Pets</a>
                    </li>

                    <li>
                        <a href="#">My Bookings</a>
                    </li>

                    <li>
                        <a href="#">Logout</a>
                    </li>
                {% else %}
                    <li>
                        <a href="#">Register</a>
                    </li>

                    <li>
                        <a href="#">Login</a>
                    </li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>
            &copy; {% now "Y" %} Walkies & Whiskers
        </p>
    </footer>
</body>
</html>
